[package]
name = "sparkle"
description = "Sparkling Authenication and Identity Resolver"
documentation = "https://docs.rs/kanidm/latest/kanidm/"

version = { workspace = true }
authors = { workspace = true }
rust-version = { workspace = true }
edition = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[features]
default = ["unix"]
unix = []
selinux = ["sparkle_resolver_common/selinux"]
tpm = ["sparkle_resolver_common/tpm"]
dhat-heap = ["dep:dhat"]
dhat-ad-hoc = ["dep:dhat"]

[[bin]]
name = "sparkled"
path = "src/bin/sparkled.rs"
required-features = ["unix"]
test = false
doctest = false

[[bin]]
name = "sparkle_tasksd"
path = "src/bin/sparkle_tasksd.rs"
required-features = ["unix"]
test = false
doctest = false

[[bin]]
name = "sparkle_ssh_authorizedkeys"
path = "src/bin/sparkle_ssh_authorizedkeys.rs"
required-features = ["unix"]
test = false
doctest = false

[[bin]]
name = "sparkle"
path = "src/bin/sparkle.rs"
required-features = ["unix"]
test = false
doctest = false


