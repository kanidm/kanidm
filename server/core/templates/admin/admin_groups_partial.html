(% extends "admin/admin_partial_base.html" %)

(% block groups_item_extra_classes %)active(% endblock %)

(% block admin_page %)
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item active" aria-current="page">Group List</li>
    </ol>
</nav>

<table class="table table-striped">
    <thead>
        <tr>
            <th scope="col">Name</th>
            <th scope="col">Uuid</th>
        </tr>
    </thead>
    <tbody>
    (% for (group, _) in groups %)
        <tr>
            <td><a href="/ui/admin/group/(( group.uuid ))/view" hx-target="#main">(( group.name ))</a></td>
            <td>(( group.uuid ))</td>
        </tr>
    (% endfor %)
    </tbody>
</table>
(% endblock %)
